<h2>Day Offer $</h2>
<div class="container">
  <div class="dealer-box">
    <img src="img/re4dealer.png" alt="dealer" width="100%">

    <div class="card">
      <img src="image.jpg" alt="img">

      <h3>{{ currentProduct().title }}</h3>
      <p class="card-product__price">${{ currentProduct().price }}</p>

      <ul>
        <li>
          <p>Free 50000</p>
        </li>
      </ul>

      <button>Add to cart</button>

      <!-- controles do slideshow -->
      <div class="slideshow-nav">
        <span
          *ngFor="let p of products; let i = index"
          class="dot"
          [class.active]="i === currentIndex()"
          (click)="goTo(i)">
        </span>
      </div>
    </div>
  </div>
</div>
